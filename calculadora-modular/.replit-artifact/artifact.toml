kind = "web"
previewPath = "/"
title = "Calculadora Modular - Helen Daiane"
version = "1.0.0"
id = "artifacts/calculadora-modular"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21285

[services.development]
run = "pnpm --filter @workspace/calculadora-modular run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calculadora-modular", "run", "build" ]
publicDir = "artifacts/calculadora-modular/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21285"
BASE_PATH = "/"
