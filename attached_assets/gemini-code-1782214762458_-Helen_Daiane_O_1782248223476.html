<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Modular com Teorema de Euler</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      color: #333;
      line-height: 1.6;
      background-color: #f3ebfc;
      /* Fundo roxo claro */
    }

    h1 {
      color: #4a148c;
      /* Título em roxo escuro */
      text-align: center;
    }

    input,
    button {
      margin: 8px 0;
      padding: 10px;
      width: 100%;
      font-size: 16px;
      box-sizing: border-box;
    }

    input {
      border: 1px solid #b39ddb;
      border-radius: 4px;
      background-color: #ffffff;
    }

    input:focus {
      outline: none;
      border-color: #6a1b9a;
      box-shadow: 0 0 5px rgba(106, 27, 154, 0.3);
    }

    button {
      background-color: #6a1b9a;
      /* Botão roxo escuro */
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #4a148c;
      /* Roxo ainda mais escuro ao passar o mouse */
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #ffffff;
      border-radius: 8px;
      border-left: 5px solid #6a1b9a;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .steps {
      margin-top: 15px;
      white-space: pre-line;
      font-family: monospace;
      background: #f8f5fc;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #e1d5f5;
    }

    footer {
      margin-top: 50px;
      padding-top: 20px;
      border-top: 2px solid #e1d5f5;
      text-align: center;
    }

    .footer-text {
      font-size: 14px;
      color: #5e35b1;
    }

    .footer-text p {
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <h1>Calculadora de Potências Modulares</h1>

  <label for="base"><strong>Base (a)</strong></label>
  <input type="number" id="base" placeholder="Ex: 3">

  <label for="exp"><strong>Expoente (b)</strong></label>
  <input type="number" id="exp" placeholder="Ex: 1000">

  <label for="mod"><strong>Módulo (n)</strong></label>
  <input type="number" id="mod" placeholder="Ex: 7">

  <button onclick="calculate()">Calcular</button>

  <div class="result" id="output" style="display:none;"></div>

  <footer>
    <div class="footer-text">
      <p>Desenvolvido por: <strong>Helen Daiane</strong></p>
      <p>Mestranda no <strong>ProfMat / UEM - 2026</strong></p>
    </div>
  </footer>

  <script>
    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      while (b !== 0) {
        let temp = b;
        b = a % b;
        a = temp;
      }
      return a;
    }

    function phi(n) {
      let result = n;
      let x = n;

      for (let p = 2; p * p <= x; p++) {
        if (x % p === 0) {
          while (x % p === 0) {
            x = Math.floor(x / p);
          }
          result -= Math.floor(result / p);
        }
      }

      if (x > 1) {
        result -= Math.floor(result / x);
      }

      return result;
    }

    function modPow(base, exp, mod) {
      let result = 1;
      base = ((base % mod) + mod) % mod;

      while (exp > 0) {
        if (exp % 2 === 1) {
          result = (result * base) % mod;
        }
        exp = Math.floor(exp / 2);
        base = (base * base) % mod;
      }

      return result;
    }

    function eulerModPower(a, b, n) {
      const d = gcd(a, n);
      let steps = [];
      steps.push(`mdc(${a}, ${n}) = ${d}`);

      if (n <= 0) {
        return {
          error: "O módulo deve ser maior que zero."
        };
      }

      if (b < 0) {
        return {
          error: "Este app inicial não trata expoentes negativos."
        };
      }

      if (d === 1) {
        const phiN = phi(n);
        let reducedExp = b % phiN;

        steps.push(`phi(${n}) = ${phiN}`);
        steps.push(`${b} mod phi(${n}) = ${reducedExp}`);
        steps.push(`${a}^${b} == ${a}^${reducedExp} (mod ${n})`);

        const result = modPow(a, reducedExp, n);
        steps.push(`Resultado final = ${result}`);

        return {
          canUseEuler: true,
          phi: phiN,
          reducedExp,
          result,
          steps
        };
      } else {
        const result = modPow(a, b, n);
        steps.push("O Teorema de Euler não se aplica diretamente (não são primos entre si).");
        steps.push("Foi usada a estratégia de exponenciação modular rápida clássica.");
        steps.push(`Resultado final = ${result}`);

        return {
          canUseEuler: false,
          result,
          steps
        };
      }
    }

    function calculate() {
      const a = parseInt(document.getElementById("base").value);
      const b = parseInt(document.getElementById("exp").value);
      const n = parseInt(document.getElementById("mod").value);
      const output = document.getElementById("output");

      if (isNaN(a) || isNaN(b) || isNaN(n)) {
        output.style.display = "block";
        output.innerHTML = "<strong>Preencha todos os campos corretamente.</strong>";
        return;
      }

      const res = eulerModPower(a, b, n);

      if (res.error) {
        output.style.display = "block";
        output.innerHTML = `<strong>${res.error}</strong>`;
        return;
      }

      output.style.display = "block";
      output.innerHTML = `
        <h2>Resultado: ${res.result}</h2>
        <div class="steps">${res.steps.join("\n")}</div>
      `;
    }
  </script>
</body>

</html>
